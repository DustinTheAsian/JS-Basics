<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>My Dashboard</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Dashboard</a>
    <a href="#">Settings</a>
</nav>

<section class="content">

    <h2>Status Overview</h2>

    <div class="card-container">
        <div class="card safe">
            <h3>Safe</h3>
            <p>Everything is normal</p>
        </div>

        <div class="card warning">
            <h3>Warning</h3>
            <p>Gas level rising</p>
        </div>

        <div class="card danger">
            <h3>Danger</h3>
            <p>High gas detected!</p>
        </div>
    </div>

    <button class="btn">Start Monitoring</button>

</section>

<footer>
    <p>© 2026 My Dashboard</p>
</footer>

<style>

    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f4f6f9;
}

/* HEADER */
header {
    background: #1e1e2f;
    color: white;
    text-align: center;
    padding: 20px;
}

/* NAVBAR */
nav {
    background: #2c2c3e;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover {
    color: #00ffcc;
}

/* CONTENT */
.content {
    padding: 30px;
    text-align: center;
}

/* CARDS */
.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 20px 0;
}

.card {
    background: white;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    transition: transform 0.2s;
}

.card:hover {
    transform: scale(1.05);
}

/* STATUS COLORS */
.safe {
    border-left: 5px solid green;
}


</style>

</body>
</html>
