<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        #display {
            font-size: 60px;
            margin-bottom: 20px;
        }

        button {
            font-size: 20px;
            margin: 5px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="display">0</div>

    <button onclick="add1()">+1</button>
    <button onclick="result()">Even / Odd</button>
    <button onclick="reset()">Reset</button>

    <script>

        let count = 0;

        // updates number display
        function showNumber() {
            let display = document.getElementById("display");
            display.innerText = count;
            display.style.color = "black";
        }

        // shows even or odd
        function result() {
            let display = document.getElementById("display");

            if (count % 2 === 0) {
                display.innerText = count + " is Even";
                display.style.color = "blue";
            } else {
                display.innerText = count + " is Odd";
                display.style.color = "red";
            }
        }

        function add1() {
            count++;
            showNumber();
        }

        function reset() {
            count = 0;
            showNumber();
        }

    </script>

</body>
</html>
