<!DOCTYPE html>
<html>
<body>

<input id="firstInput" placeholder="Type here">

<button onclick="sendData()">Send</button>

<input id="secondInput" placeholder="Will receive data">

<script>

let firstInput = document.getElementById("firstInput");
let secondInput = document.getElementById("secondInput");

function sendData() {

    // get the value from first input
    let data = firstInput.value;

    // send it into second input
    secondInput.value = data;

}

</script>

</body>
</html>
