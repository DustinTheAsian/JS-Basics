<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

        <button onclick="btn1()">Rock</button>

<script>

    function btn1(){

    const shuffle = Math.random();
    let computer = '';

    if (shuffle > 0 && shuffle <1/3){
        computer = 'Rock';
    } 
    else if (shuffle >= 1/3 && shuffle < 2/3){
        computer = 'Paper';
    } 
    else {
        computer = 'Scissors';

        alert(`computer picked ${computer}`);
    }

    }
    
</script>
    
</body>
</html>
