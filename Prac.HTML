<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 id="bigText">hello World</h1>

    <input id="first" type="text" placeholder="input something">
    <button onclick = "changeText()">Change Text</button>

    
    <script>

        function changeText(){
            let header = document.getElementById("bigText");
            let input = document.getElementById("first");

            header.textContent = input.value;

        }

    </script>
    
</body>
</html>
