<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <Style>
        .btn-primary{
            background-color: rgb(0, 0, 0);
            color: white;
                padding: 10px 20px;
                border: none;
                cursor: pointer;
        }

        .form-control{
            border: 1px solid #ccc;
            padding: 8px;
        }
    </Style>

</head>
<body>

    <p id = "parag">Hello, World!</p>
    
    <input class = "form-control" id = "myInput" type = text placeholder="Enter Number">
    <button class = "btn-primary" onclick = "hey()">click Me</button>

    <script>

        function hey(){
            let input = document.getElementById("myInput");
            let val = input.value;


            if (val === ""){
                document.getElementById("parag").innerHTML = "Please enter a number";
                return;
            }

            if (val > 10) {
                document.getElementById("parag").innerHTML = "number is greater than 10";
            }
             else if (val < 10) {
                document.getElementById("parag").innerHTML = "number is less than 10";
            }
             else {
                document.getElementById("parag").innerHTML = "number is equal to 10";
            }

        }

    </script>

</body>
</html>
