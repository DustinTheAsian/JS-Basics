<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Counter App</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        #display {
            font-size: 60px;
            margin-bottom: 20px;
        }

        button {
            font-size: 20px;
            margin: 5px;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="display">0</div>

    <button onclick="add1()">+1</button>
    <button onclick="add5()">+5</button>
    <button onclick="minus1()">-1</button>
    <button onclick="reset()">Reset</button>

    <script>

        let count = 0;

        function updateDisplay() {
            document.getElementById("display").innerText = count;
        }

        function add1() {
            count++;
            updateDisplay();
        }

        function add5() {
            count += 5;
            updateDisplay();
        }

        function minus1() {
            count--;
            updateDisplay();
        }

        function reset() {
            count = 0;
            updateDisplay();
        }

    </script>

</body>
</html>
