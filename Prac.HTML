<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1 id="big-Text">change me</h1>

    <input id="put" type="text" placeholder="Input Text">

    <button onclick="verifydata()">Send</button>

    <script>

        function verifydata(){
            let dat = put.value;

            let header = document.getElementById("big-Text");

            if(dat === "hello"){
                document.innerHTML("big-Text").style.color = 'red';
            }

             header.textContent = dat;

             put.value = "";

            

        }

    </script>
</body>
</html>
