<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">

    <style>body {
    font-family: Arial;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    margin-top: 100px;
}

.container {
    text-align: center;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px;
    background: #00adb5;
    border: none;
    color: white;
    cursor: pointer;
}

li {
    margin: 10px;
    cursor: pointer;
}</style>
</head>
<body>

    <div class="container">
        <h1>To-Do List</h1>

        <input type="text" id="taskInput" placeholder="Enter task">
        <button id="addBtn">Add</button>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
