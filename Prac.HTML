    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Change Text Example</title>

        <style>
            body{
                font-family: Arial;
                text-align: center;
                margin-top: 100px;
            }

            .btn{
                padding: 10px 20px;
                border: none;
                background-color: black;
                color: white;
                cursor: pointer;
            }
        </style>
    </head>
    <body>



        <p id="text">WHAT IS THIS?</p>

        <input id="myinput" type="text" placeholder="Enter Digit">

        <button class="btn" onclick="verify()">Click Me</button>
        
 <script>
function verify(){

    let input = document.getElementById("myinput");
    let val = input.value;

    if(val % 2 === 0){
        document.getElementById("text").innerHTML = "EVEN";
    }
    else{
        document.getElementById("text").innerHTML = "ODD";
    }

}
</script>

    </body>
    </html>
