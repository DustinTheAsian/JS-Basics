<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Please subscribe to my channel</p>

    <div id = "mydiv"></div>

    <button class = "btn1" onclick="sub()">subscribe</button>

    <script>
        
        function sub(){

            let sub = document.querySelector(".btn1");

            if(sub.innerHTML === "subscribe"){
                sub.innerHTML = "subscribed";
            }
            else{
                sub.innerHTML = "subscribe";
            }
        }

    </script>

</body>
</html>
