<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            width: 200px;
        }

        button {
            padding: 10px;
            cursor: pointer;
        }

        li {
            margin: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>My To-Do List</h2>

    <input type="text" id="input" placeholder="Add a task...">
    <button class= "btn1" onclick="addTask()">ADD</button>

    <ul id="list"></ul>

    <script>
        function addTask(){
           let input = document.getElementById("input");
           let task = document.getElementById("list");

           let value = input.value;

            if(value === ""){
                alert('Please Enter Input');
            }

            let list = document.createElement("li");
            list.textContent = value; 
            
            task.appendChild(list);

            list.onclick = function(){
            task.removeChild(list);
            }

            input.value = "";


        }
    </script>

</body>
</html>
