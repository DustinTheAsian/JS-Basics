<!DOCTYPE html>
<html>
<body>

<p>Please subscribe to my channel</p>

<div id="mydiv"></div>

<button onclick="sub()" id="subBtn">subscribe</button>

<input type="text" id="myinput" placeholder="please enter something">
<button onclick="detail()">ENTER</button>
<button onclick="removeAll()">Delete All</button>

<script>

function sub() {
    let btn = document.getElementById("subBtn");

    if (btn.innerHTML === "subscribe") {
        btn.innerHTML = "subscribed";
        btn.style.backgroundColor = "gray";
    } else {
        btn.innerHTML = "subscribe";
        btn.style.backgroundColor = "red";
    }
}

function detail() {

    let input = document.getElementById("myinput").value;
    let value = input.value.trim();

    if(value === ""){
        alert("please input something");
    }

    let p = createElement("p");
    p.textContent = value;

    document.getElementById("mydiv").appendChild(p);
    input.value = "";

}

function removeAll() {
    let div = document.getElementById("mydiv");
    div.innerHTML = "";
}


</script>

</body>
</html>
