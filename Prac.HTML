<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> <link rel="stylesheet" href="Design.CSS">
</head>
<body>
    
    <div class="Container" id = "java-Container">

    <div class="Blan" id="Typing">
        <input id="input" class="Blannk" type="text" placeholder="Enter Digit" readonly>
    </div>

    <div class="numbers" id="compute">
        <button onclick="appendtoinput(1)">1</button>
        <button onclick="appendtoinput(2)">2</button>
        <button onclick="appendtoinput(3)">3</button>
        <button onclick="appendtoinput(4)">4</button>
        <button onclick="appendtoinput(5)">5</button>

    </div>

  
    <script>

        let input = document.getElementById("input");

        let buttons = document.querySelectorAll(".num-design");

        buttons.forEach(button => {

            button.addEventListener("click", function () {

                input.value += button.textContent;

            });

        });

    </script>

</body>
</html>
