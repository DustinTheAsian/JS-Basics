<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Text Example</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        .btn{
            padding: 10px 20px;
            border: none;
            background-color: black;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>



    <p id="text">WHAT IS THIS?</p>

    <p id="number">0</p>

    <button class="btn" onclick="changeText()">Click Me</button>
    
     <button class="btn" onclick="Plus()">ADD</button>
     <button class="btn" onclick="del()">SUBTRACT</button>
    <script>
        
        let num = 0;

        function Plus(){
            num++;
            document.getElementById("number").innerHTML = num;
        }

        function changeText(){
            if (num % 2 === 0){
                document.getElementById("text").innerHTML = "Its Even";
                document.getElementById("text").style.color = "green";
            }else{
                document.getElementById("text").innerHTML = "Its Odd";
                document.getElementById("text").style.color = "red";
            }
        }

        function del(){
            num--;
            document.getElementById("number").innerHTML = num;
        }
    </script>

</body>
</html>
