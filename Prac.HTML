<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
    .btn{
        background-color: black;
        color: white;
        padding: 10px 20px;
        border: none;
        cursor: pointer;
    }
    .form-control{
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }


    </style>

</head>
<body>

    <div id="mydiv"></div>
    
    <p>please enter task</p>

    <button class="btn" onclick="hey()">ADD</button>

    <input id = "myinput" class ="form-control" type="text" placeholder="ENTER SOMETHING"> 

    <script>

        let count = 0;

        function hey(){
            let input = document.getElementById("myinput");
            let div = document.getElementById("mydiv");

            let value = input.value;

            count++;

            let p = createElement("p");
            p.textContent = count + ". " + value;

            div.appendChild(p);
        }

    </script>

</body>
</html>
