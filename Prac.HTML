<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Page</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
    text-align: center;
}

.container {
    margin-top: 20%;
}

button {
    padding: 12px 20px;
    border: none;
    background: white;
    color: black;
    cursor: pointer;
}

button:hover {
    background: gray;
}
</style>
</head>

<body>
<div class="container">
    <h1>Minimal Vibes</h1>
    <p>Simple. Clean. Focused.</p>
    <button onclick="changeText()">Click Me</button>
</div>

<script>
function changeText() {
    document.querySelector("p").innerText = "You just changed the text 😎";
}
</script>
</body>
</html>
