<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
<div class="place">
    <button onclick="hett()">Rock</button>
</div>

    <script>

        const score = { wins:0, losses:0, tie:0 };      // Rock 

function hett() {
    const shuffle = Math.random();
    let computer = "";

    if (shuffle > 0 && shuffle < 1/3){
        computer = "Rock";
    }else if (shuffle >= 1/3 && shuffle < 2/3){
        computer = "Paper";
    }else {
        computer = "Scissors";
    }


    let result = "";

    if(computer === "Rock"){
        result = "tie";
    }else if (computer === "Paper"){
        result = "You Lose";
    }else {
        result = "You Win";
    }

    if(result === "You Win"){
        score.wins++;
    }else if (result === "You Lose"){
        score.losses++;
    }

     alert(`Computer picked ${computer},You picked Rock, ${result}!... wins: ${score.wins},Losses: ${score.losses}, ${score.tie}`);

}

    </script>

</body>
</html>
